version: 2

models:
  - name: fct_weather_daily
    description: >
      Daily fact table: aggregations of hourly weather forecasts per date and location.
      Materialised as a TABLE for fast dashboard queries. Rebuilt on every dbt run.

    columns:
      - name: event_date
        description: "Calendar date of the aggregation bucket"
        tests:
          - not_null

      - name: latitude
        description: "Location latitude"
        tests:
          - not_null

      - name: longitude
        description: "Location longitude"
        tests:
          - not_null

      - name: max_temperature_2m
        description: "Maximum temperature recorded for the day"
        
      - name: min_temperature_2m
        description: "Minimum temperature recorded for the day"

      - name: avg_temperature_2m
        description: "Average temperature for the day"

      - name: avg_humidity
        description: "Average relative humidity for the day"

      - name: max_wind_speed
        description: "Maximum wind speed for the day"

      - name: total_precipitation
        description: "Total precipitation for the day (sum of hourly)"

      - name: avg_surface_pressure
        description: "Average surface pressure for the day"

      - name: hourly_records
        description: "Number of hourly records contributing to this daily aggregation"
        tests:
          - not_null
